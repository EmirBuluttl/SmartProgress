name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    name: Build signed Android App Bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      NODE_ENV: production
      EXPO_PUBLIC_API_URL: https://api.smartprogress.online
      EXPO_PUBLIC_REVENUECAT_PREMIUM_ENTITLEMENT_ID: premium
      EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY }}
      EXPO_PUBLIC_PRIVACY_URL: https://app.smartprogress.online/privacy
      EXPO_PUBLIC_SUPPORT_URL: https://app.smartprogress.online/support
      EXPO_PUBLIC_ACCOUNT_DELETION_URL: https://app.smartprogress.online/account-deletion

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" || (echo "Missing ANDROID_KEYSTORE_BASE64" && exit 1)
          test -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" || (echo "Missing ANDROID_KEYSTORE_PASSWORD" && exit 1)
          test -n "${{ secrets.ANDROID_KEY_ALIAS }}" || (echo "Missing ANDROID_KEY_ALIAS" && exit 1)
          test -n "${{ secrets.ANDROID_KEY_PASSWORD }}" || (echo "Missing ANDROID_KEY_PASSWORD" && exit 1)
          test -n "${{ secrets.EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY }}" || (echo "Missing EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY" && exit 1)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Generate Android project
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Configure release signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/smartprogress-upload.jks
          cat > android/key.properties <<EOF
          storeFile=smartprogress-upload.jks
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF
          node scripts/configure-android-signing.mjs

      - name: Build release AAB
        working-directory: frontend/android
        run: ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartprogress-android-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
