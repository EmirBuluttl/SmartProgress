name: Build Android AAB

on:
  workflow_dispatch:

jobs:
  build:
    name: Build signed Android App Bundle
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      EXPO_PUBLIC_API_URL: https://api.smartprogress.online
      EXPO_PUBLIC_REVENUECAT_PREMIUM_ENTITLEMENT_ID: premium
      EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY }}
      EXPO_PUBLIC_PRIVACY_URL: https://app.smartprogress.online/privacy
      EXPO_PUBLIC_SUPPORT_URL: https://app.smartprogress.online/support
      EXPO_PUBLIC_ACCOUNT_DELETION_URL: https://app.smartprogress.online/account-deletion

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          test -n "${ANDROID_KEYSTORE_BASE64:-}" || (echo "Missing ANDROID_KEYSTORE_BASE64" && exit 1)
          test -n "${ANDROID_KEYSTORE_PASSWORD:-}" || (echo "Missing ANDROID_KEYSTORE_PASSWORD" && exit 1)
          test -n "${ANDROID_KEY_ALIAS:-}" || (echo "Missing ANDROID_KEY_ALIAS" && exit 1)
          test -n "${ANDROID_KEY_PASSWORD:-}" || (echo "Missing ANDROID_KEY_PASSWORD" && exit 1)
          test -n "${EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY:-}" || (echo "Missing EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY" && exit 1)
          test -n "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}" || (echo "Missing GOOGLE_PLAY_SERVICE_ACCOUNT_JSON" && exit 1)

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --include=dev --production=false

      - name: Verify TypeScript install
        run: npm ls typescript

      - name: Typecheck
        run: ./node_modules/.bin/tsc --noEmit

      - name: Write Expo public env
        run: |
          printf '%s\n' \
            'EXPO_PUBLIC_API_URL=https://api.smartprogress.online' \
            'EXPO_PUBLIC_REVENUECAT_PREMIUM_ENTITLEMENT_ID=premium' \
            'EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY=${{ secrets.EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY }}' \
            'EXPO_PUBLIC_PRIVACY_URL=https://app.smartprogress.online/privacy' \
            'EXPO_PUBLIC_SUPPORT_URL=https://app.smartprogress.online/support' \
            'EXPO_PUBLIC_ACCOUNT_DELETION_URL=https://app.smartprogress.online/account-deletion' \
            > .env
          node -e "const fs=require('fs'); const env=fs.readFileSync('.env','utf8'); const match=env.match(/^EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY=(.+)$/m); const key=match?.[1] || ''; console.log('RevenueCat Android key length:', key.length); console.log('RevenueCat Android key prefix:', key.slice(0,5)); if (!key || !key.startsWith('goog_')) { console.error('Invalid EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY. Android RevenueCat public SDK key must start with goog_.'); process.exit(1); }"

      - name: Generate Android project
        env:
          NODE_ENV: production
        run: npx expo prebuild --platform android --clean --non-interactive

      - name: Configure release signing
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/smartprogress-upload.jks
          printf '%s\n' \
            'storeFile=smartprogress-upload.jks' \
            'storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' \
            'keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}' \
            'keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}' \
            > android/key.properties
          node scripts/configure-android-signing.mjs

      - name: Build release AAB
        working-directory: frontend/android
        env:
          NODE_ENV: production
        run: ./gradlew bundleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartprogress-android-aab
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload AAB to Google Play internal testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.smartprogress.app
          releaseFiles: frontend/android/app/build/outputs/bundle/release/app-release.aab
          track: internal
