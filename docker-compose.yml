version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: smartprogress-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - smartprogress-network

  backend:
    build: ./backend
    container_name: smartprogress-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      REDIS_URL: redis://redis:6379
      APP_URL: ${APP_URL:-https://app.smartprogress.online}
      PASSWORD_RESET_FROM_EMAIL: ${PASSWORD_RESET_FROM_EMAIL:-SmartProgress <noreply@smartprogress.online>}
      PASSWORD_RESET_EXPOSE_TOKEN: ${PASSWORD_RESET_EXPOSE_TOKEN:-false}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      AI_INPUT_COST_MICROS_PER_1K: ${AI_INPUT_COST_MICROS_PER_1K:-1000}
      AI_OUTPUT_COST_MICROS_PER_1K: ${AI_OUTPUT_COST_MICROS_PER_1K:-4000}
      AI_DEFAULT_MAX_OUTPUT_TOKENS: ${AI_DEFAULT_MAX_OUTPUT_TOKENS:-500}
      PORT: 3000
    depends_on:
      - redis
    networks:
      - smartprogress-network

  frontend:
    build: ./frontend
    container_name: smartprogress-frontend
    restart: unless-stopped
    environment:
      EXPO_DEV_CLIENT_NETWORK_OPTION: lan
      NODE_ENV: production
      EXPO_PUBLIC_API_URL: https://api.smartprogress.online
      API_URL: https://api.smartprogress.online
    command: [ "npx", "expo", "start", "--web", "--host", "lan", "--clear" ]
    depends_on:
      - backend
    networks:
      - smartprogress-network

  caddy:
    image: caddy:2-alpine
    container_name: smartprogress-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    networks:
      - smartprogress-network

networks:
  smartprogress-network:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
